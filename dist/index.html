<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeedoZone</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-86RPKVMVQ8"></script>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      gtag('js', new Date());

      gtag('config', 'G-86RPKVMVQ8');
    </script>

    <!-- Google Translate (full-page translation; widget UI is hidden) -->
    <style>
      /* Hide the Google Translate widget UI completely */
      #google_translate_element,
      .goog-te-banner-frame,
      .goog-te-gadget,
      .goog-te-gadget-icon,
      .goog-logo-link,
      .skiptranslate iframe { display: none !important; }
      .goog-te-gadget { font-size: 0 !important; }

      /* Stop Google from pushing the page down */
      body { top: 0 !important; position: static !important; }

      /* Prevent translate tooltip popups */
      .goog-tooltip,
      .goog-tooltip:hover,
      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
    </style>
    <script>
      // Initialize Google Translate when the script loads.
      // The widget is hidden — we trigger language changes from React.
      function googleTranslateElementInit() {
        try {
          new google.translate.TranslateElement(
            {
              pageLanguage: 'en',
              includedLanguages: 'en,mr,hi',
              autoDisplay: false,
              layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            },
            'google_translate_element'
          );
          window.__googleTranslateReady = true;
          // If a language was queued before init finished, apply it now.
          if (window.__pendingTranslateLang) {
            window.dispatchEvent(new CustomEvent('feedo-apply-language', { detail: window.__pendingTranslateLang }));
            window.__pendingTranslateLang = null;
          }
        } catch (e) {
          console.warn('Google Translate init failed:', e);
        }
      }
    </script>
    <script type="text/javascript"
            src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
            async></script>
    <script type="module" crossorigin src="/assets/index-DlbItxhw.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DgeuDdLU.css">
  </head>

  <body>
    <!-- Hidden Google Translate target -->
    <div id="google_translate_element" style="display:none"></div>

    <div id="root"></div>

  </body>
</html>
